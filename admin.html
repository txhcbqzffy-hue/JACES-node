<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin produits | JACES</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, sans-serif;
    background: #f5f1ea;
    color: #1b1a17;
  }
  header {
    padding: 10px 18px;
    background: #171411;
    color: #f6f1ea;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.05rem; margin: 0; letter-spacing: 0.04em; text-transform: uppercase; }
  header button {
    background: transparent;
    border: 1px solid #6b645c;
    color: #f6f1ea;
    padding: 6px 12px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  main { max-width: 1440px; margin: 0 auto; padding: 14px; }
  .gate {
    max-width: 360px;
    margin: 15vh auto;
    background: #fff;
    padding: 28px;
    border: 1px solid #d8cfc2;
  }
  .gate h2 { margin-top: 0; font-size: 1rem; }
  .gate input { width: 100%; padding: 10px; border: 1px solid #c8bfb3; margin: 10px 0; font-size: 0.9rem; }
  .gate button, .primary-btn {
    width: 100%;
    padding: 11px;
    background: #171411;
    color: #f6f1ea;
    border: none;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .gate-error { color: #a5321f; font-size: 0.8rem; min-height: 1.2em; }
  .layout { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 14px; align-items: start; }
  .card { background: #fff; border: 1px solid #d8cfc2; padding: 16px 18px; margin-bottom: 12px; }
  .card h2 { margin-top: 0; margin-bottom: 10px; font-size: 0.92rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .field { margin-bottom: 11px; }
  .field label { display: block; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; color: #595149; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid #c8bfb3; font-size: 0.94rem; background: #fffcf7; color: #15120f;
  }
  .field textarea { min-height: 54px; resize: vertical; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .list-row { display: flex; gap: 7px; margin-bottom: 6px; align-items: center; }
  .list-row input { flex: 1; }
  .field-wide { background: #faf6ee; border: 1px solid #eee3d2; padding: 12px 13px; }
  .field-collapsible { margin-bottom: 10px; }
  .field-collapsible summary { cursor: pointer; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: #595149; padding: 5px 0; list-style: none; }
  .field-collapsible summary::-webkit-details-marker { display: none; }
  .field-collapsible summary::before { content: '▸ '; }
  .field-collapsible[open] summary::before { content: '▾ '; }
  .field-collapsible .field:first-of-type { margin-top: 8px; }
  .field-wide label { font-size: 0.8rem; margin-bottom: 6px; }
  .field-wide .list-row { margin-bottom: 7px; }
  .field-wide .list-row input, .field-wide .list-row select { padding: 9px 10px; font-size: 0.95rem; }
  .field-wide .add-btn { padding: 8px 12px; font-size: 0.82rem; }
  #reviews-list { max-height: 210px; overflow-y: auto; padding-right: 4px; }
  .review-row { align-items: flex-start; }
  .review-row input { flex: 0 0 120px; }
  .review-row select { flex: 0 0 62px; }
  .review-row textarea { flex: 1; min-height: 36px; resize: vertical; }
  .list-row button, .add-btn { background: #ece5d8; border: 1px solid #c8bfb3; padding: 7px 10px; cursor: pointer; font-size: 0.78rem; }
  .add-btn { margin-top: 4px; }
  fieldset { border: 1px solid #d8cfc2; margin-bottom: 10px; padding: 9px 11px; border-left-width: 4px; }
  legend { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.05em; color: #595149; padding: 0 6px; font-weight: 700; }
  .checkbox-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 5px; }
  .checkbox-grid label { display: flex; align-items: center; gap: 6px; font-size: 0.86rem; text-transform: none; letter-spacing: 0; color: #1b1a17; }
  .checkbox-grid input { width: auto; }
  .actions {
    display: flex; gap: 10px; margin-top: 12px; position: sticky; bottom: 0; z-index: 10;
    background: #fff; padding: 12px 0 6px; border-top: 1px solid #e4ddd1;
  }
  .sidebar-col { position: sticky; top: 14px; max-height: calc(100vh - 28px); overflow-y: auto; }
  .actions button { flex: 1; padding: 10px; font-size: 0.82rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }
  .btn-secondary { background: #ece5d8; border: 1px solid #c8bfb3; color: #1b1a17; }
  .status-msg { font-size: 0.84rem; margin-top: 8px; min-height: 1.2em; }
  .status-msg.error { color: #a5321f; }
  .status-msg.ok { color: #2f6b3a; }
  .field-hint { margin: 6px 0 0; font-size: 0.78rem; color: #a5321f; }
  .field-hint-neutral { color: #8a8175; font-style: italic; }
  fieldset[data-menu="categories"], fieldset[data-menu="accessoires"] { border-left-color: #2f5a80; background: #f3f7fb; }
  fieldset[data-menu="categories"] legend, fieldset[data-menu="accessoires"] legend { color: #2f5a80; }
  fieldset[data-menu="collaborations"] { border-left-color: #6a2f80; background: #f8f3fb; }
  fieldset[data-menu="collaborations"] legend { color: #6a2f80; }
  fieldset[data-menu="nouveautes"], fieldset[data-menu="nouveautes_categories"] { border-left-color: #a5601f; background: #fbf5ec; }
  fieldset[data-menu="nouveautes"] legend, fieldset[data-menu="nouveautes_categories"] legend { color: #a5601f; }
  fieldset[data-menu="collections"] { border-left-color: #2f6b3a; background: #f2f8f3; }
  fieldset[data-menu="collections"] legend { color: #2f6b3a; }
  .product-list-item {
    display: flex; gap: 9px; align-items: center; padding: 8px; border: 1px solid #e4ddd1; margin-bottom: 7px; cursor: pointer; background: #fff;
  }
  .product-list-item:hover { background: #f8f3eb; }
  .product-list-item img { width: 40px; height: 50px; object-fit: cover; background: #eee; }
  .product-list-item .meta { flex: 1; min-width: 0; }
  .product-list-item .meta strong { display: block; font-size: 0.86rem; }
  .product-list-item .meta span { font-size: 0.76rem; color: #6f675f; }
  .product-list-item .del { background: none; border: none; color: #a5321f; cursor: pointer; font-size: 0.92rem; padding: 4px 8px; }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Accès admin</h2>
  <input type="password" id="gate-password" placeholder="Mot de passe">
  <button id="gate-submit">Entrer</button>
  <p class="gate-error" id="gate-error"></p>
</div>

<div id="app" hidden>
  <header>
    <h1>Admin produits JACES</h1>
    <button id="logout-btn">Déconnexion</button>
  </header>
  <main>
    <div class="layout">
      <div>
        <div class="card">
          <h2 id="form-title">Nouveau produit</h2>
          <form id="product-form">
            <input type="hidden" id="product-id">
            <div class="row">
              <div class="field">
                <label for="f-name">Nom</label>
                <input type="text" id="f-name" required>
              </div>
              <div class="field">
                <label for="f-price">Prix (€)</label>
                <input type="number" id="f-price" min="0" step="0.01" required>
              </div>
            </div>

            <div class="field field-wide">
              <label>Images (liens Cloudinary / Dropbox)</label>
              <div id="images-list"></div>
              <button type="button" class="add-btn" id="add-image-btn">+ Ajouter une image</button>
            </div>

            <div class="field field-wide">
              <label>Variantes (taille / couleur / stock)</label>
              <div id="variants-list"></div>
              <button type="button" class="add-btn" id="add-variant-btn">+ Ajouter une variante</button>
            </div>

            <div class="field">
              <label for="f-description">Description</label>
              <textarea id="f-description" required></textarea>
            </div>

            <details class="field-collapsible">
              <summary>Porté et style / Entretien (optionnel)</summary>
              <div class="field">
                <label for="f-style-notes">Porté et style / Taille et coupe</label>
                <textarea id="f-style-notes"></textarea>
              </div>

              <div class="field">
                <label for="f-care-instructions">Entretien</label>
                <textarea id="f-care-instructions"></textarea>
              </div>
            </details>

            <div id="filters-container"></div>

            <details class="field field-collapsible" id="material-field" hidden open>
              <summary>Mati&egrave;re (filtre Accessoires)</summary>
              <div class="checkbox-grid" id="material-checkboxes">
                <label><input type="checkbox" name="material" value="cuir"> Cuir</label>
                <label><input type="checkbox" name="material" value="metal"> M&eacute;tal</label>
                <label><input type="checkbox" name="material" value="soie"> Soie</label>
                <label><input type="checkbox" name="material" value="laine"> Laine</label>
                <label><input type="checkbox" name="material" value="coton"> Coton</label>
              </div>
              <p class="field-hint" id="material-required-hint">Obligatoire : au moins une mati&egrave;re, car un accessoire (Sacs/Bijoux/Ceintures/Foulards) est coch&eacute; ci-dessus.</p>
            </details>

            <div class="field">
              <label style="display:flex;align-items:center;gap:8px;font-weight:normal;">
                <input type="checkbox" id="f-show-in-related" style="width:auto;">
                Afficher en bas des fiches produit ("En ce moment")
              </label>
            </div>

            <div class="row">
              <div class="field">
                <label for="f-fit-rating">Port&eacute;</label>
                <select id="f-fit-rating">
                  <option value="petit">Petit</option>
                  <option value="normal" selected>Normal</option>
                  <option value="grand">Grand</option>
                </select>
              </div>
              <div class="field">
                <label for="f-quality-rating">Qualit&eacute;</label>
                <select id="f-quality-rating">
                  <option value="moyenne">Moyenne</option>
                  <option value="bonne">Bonne</option>
                  <option value="premium" selected>Premium</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>Avis clients</label>
              <div id="reviews-list"></div>
              <button type="button" class="add-btn" id="add-review-btn">+ Ajouter un avis</button>
            </div>

            <div class="field">
              <label>Photos clientes (liens Cloudinary / Dropbox)</label>
              <div id="review-photos-list"></div>
              <button type="button" class="add-btn" id="add-review-photo-btn">+ Ajouter une photo cliente</button>
            </div>

            <p class="status-msg" id="form-status"></p>

            <div class="actions">
              <button type="submit" class="primary-btn">Enregistrer</button>
              <button type="button" class="btn-secondary" id="cancel-edit-btn">Nouveau produit</button>
            </div>
          </form>
        </div>
      </div>

      <div class="sidebar-col">
        <div class="card">
          <h2>Produits existants</h2>
          <div id="product-list"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
const PASSWORD_KEY = 'jaces_admin_password';
const gate = document.getElementById('gate');
const app = document.getElementById('app');
const gateError = document.getElementById('gate-error');

function getPassword() {
  return sessionStorage.getItem(PASSWORD_KEY) || '';
}

async function apiFetch(path, options = {}) {
  const res = await fetch(path, options);
  return res;
}

async function adminPost(payload) {
  const res = await fetch('/api/admin-products', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Password': getPassword()
    },
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    sessionStorage.removeItem(PASSWORD_KEY);
    showGate('Mot de passe invalide.');
    throw new Error('unauthorized');
  }
  if (!res.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
}

function showGate(message) {
  gate.hidden = false;
  app.hidden = true;
  gateError.textContent = message || '';
}

function showApp() {
  gate.hidden = true;
  app.hidden = false;
  init();
}

document.getElementById('gate-submit').addEventListener('click', async () => {
  const value = document.getElementById('gate-password').value;
  if (!value) return;
  sessionStorage.setItem(PASSWORD_KEY, value);
  try {
    await adminPost({ action: 'ping' });
  } catch (error) {
    if (error.message === 'unauthorized') return;
  }
  showApp();
});

document.getElementById('gate-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('gate-submit').click();
});

document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem(PASSWORD_KEY);
  showGate('');
});

let filtersByMenu = {};
let editingId = null;

const MENU_LABELS = {
  categories: 'Catégories (visible sur Collection) — choisissez ici en premier',
  nouveautes: 'Nouveautés (visible sur Accueil + Nouveautés)',
  nouveautes_categories: 'Catégories (visible sur Nouveautés) — optionnel, en plus de la vraie catégorie ci-dessus',
  accessoires: 'Accessoires (visible sur Accessoires)',
  collaborations: 'Collaborations (visible sur Collaborations)',
  collections: 'Saison (visible sur Collection)'
};

function imageRow(value = '') {
  const row = document.createElement('div');
  row.className = 'list-row';
  row.innerHTML = `<input type="url" placeholder="https://res.cloudinary.com/..." value="${value.replace(/"/g, '&quot;')}"><button type="button">✕</button>`;
  row.querySelector('button').addEventListener('click', () => row.remove());
  return row;
}

const SIZE_OPTIONS = ['34', '36', '38', '40', '42', '44'];
const COLOR_OPTIONS = ['Noir', 'Blanc', 'Gris', 'Argent', 'Rouge', 'Bleu', 'Vert', 'Jaune', 'Orange', 'Rose', 'Violet', 'Marron', 'Beige', 'Doré', 'Bronze', 'Transparent', 'Multicolore'];

function buildOptionsHtml(options, current) {
  // Match case-insensitively so legacy lowercase values (e.g. "noir" saved
  // before this dropdown existed) select the properly-cased option instead
  // of showing up as a separate raw entry.
  const canonicalMatch = options.find((value) => value.toLowerCase() === String(current || '').toLowerCase());
  const resolvedCurrent = canonicalMatch || current;
  const known = options.includes(resolvedCurrent) || !resolvedCurrent
    ? ''
    : `<option value="${resolvedCurrent}" selected>${resolvedCurrent}</option>`;
  return known + options.map((value) => `<option value="${value}"${value === resolvedCurrent ? ' selected' : ''}>${value}</option>`).join('');
}

function variantRow(size = '', color = '', stock = '') {
  const row = document.createElement('div');
  row.className = 'list-row';
  row.innerHTML = `
    <select class="variant-size" style="max-width:140px">
      <option value="">Taille</option>
      ${buildOptionsHtml(SIZE_OPTIONS, size)}
    </select>
    <select class="variant-color" style="max-width:180px">
      <option value="">Couleur</option>
      ${buildOptionsHtml(COLOR_OPTIONS, color)}
    </select>
    <input type="number" placeholder="Stock" min="0" value="${stock}" style="max-width:130px">
    <button type="button">✕</button>`;
  row.querySelector('button').addEventListener('click', () => row.remove());
  return row;
}

function reviewPhotoRow(value = '') {
  const row = document.createElement('div');
  row.className = 'list-row';
  row.innerHTML = `<input type="url" placeholder="https://res.cloudinary.com/..." value="${value.replace(/"/g, '&quot;')}"><button type="button">✕</button>`;
  row.querySelector('button').addEventListener('click', () => row.remove());
  return row;
}

function reviewRow(author = '', rating = 5, text = '') {
  const row = document.createElement('div');
  row.className = 'list-row review-row';
  row.innerHTML = `
    <input type="text" class="review-author" placeholder="Nom cliente" value="${String(author).replace(/"/g, '&quot;')}">
    <select class="review-rating">
      ${[5, 4, 3, 2, 1].map((n) => `<option value="${n}"${Number(rating) === n ? ' selected' : ''}>${n}★</option>`).join('')}
    </select>
    <textarea class="review-text" placeholder="Texte de l'avis">${String(text)}</textarea>
    <button type="button">✕</button>`;
  row.querySelector('button').addEventListener('click', () => row.remove());
  return row;
}

document.getElementById('add-image-btn').addEventListener('click', () => {
  document.getElementById('images-list').appendChild(imageRow());
});
document.getElementById('add-review-photo-btn').addEventListener('click', () => {
  document.getElementById('review-photos-list').appendChild(reviewPhotoRow());
});
document.getElementById('add-review-btn').addEventListener('click', () => {
  // Newest first, matching how reviews are ordered everywhere else.
  document.getElementById('reviews-list').prepend(reviewRow());
});
document.getElementById('add-variant-btn').addEventListener('click', () => {
  document.getElementById('variants-list').appendChild(variantRow());
  updateVariantSizeAvailability();
});

// Native radios can't be unchecked by clicking the already-selected one -
// clicking it again clears the whole group instead, so a category or
// accessory type can be picked "by mistake" and then cleared back to none.
// event.target may be the <label> (clicking its text) rather than the
// nested <input>, so look inside the label too, not just up via closest().
function getRadioFromFilterEvent(event) {
  if (event.target.matches('input[type="radio"]')) return event.target;
  const label = event.target.closest('label');
  return label ? label.querySelector('input[type="radio"]') : null;
}

document.getElementById('filters-container').addEventListener('mousedown', (event) => {
  const input = getRadioFromFilterEvent(event);
  if (input) input.dataset.wasChecked = input.checked ? '1' : '';
});
// Clicking a <label> actually fires two click events (one on the label,
// then a synthetic one on the input) - the input's own default action
// re-checks it right after, so this must run in the capture phase and
// preventDefault() before that default action applies, not just react
// to it afterwards.
document.getElementById('filters-container').addEventListener('click', (event) => {
  const input = getRadioFromFilterEvent(event);
  if (input && input.dataset.wasChecked === '1') {
    event.preventDefault();
    input.checked = false;
    input.dataset.wasChecked = '';
    input.dispatchEvent(new Event('change', { bubbles: true }));
  }
}, true);

async function loadFilters() {
  const res = await apiFetch('/api/filters');
  const rows = await res.json();
  filtersByMenu = {};
  rows.forEach((filter) => {
    const menu = filter.menu || 'autre';
    if (!filtersByMenu[menu]) filtersByMenu[menu] = [];
    filtersByMenu[menu].push(filter);
  });

  const container = document.getElementById('filters-container');
  container.innerHTML = '';
  // Explicit display order (Saison before Collaborations) instead of the
  // API's alphabetical menu order.
  const MENU_ORDER = ['accessoires', 'categories', 'collections', 'collaborations', 'nouveautes_categories', 'nouveautes'];
  const menuKeys = Object.keys(filtersByMenu).sort((a, b) => {
    const indexA = MENU_ORDER.indexOf(a);
    const indexB = MENU_ORDER.indexOf(b);
    if (indexA === -1 && indexB === -1) return a.localeCompare(b);
    if (indexA === -1) return 1;
    if (indexB === -1) return -1;
    return indexA - indexB;
  });
  menuKeys.forEach((menu) => {
    const fieldset = document.createElement('fieldset');
    fieldset.dataset.menu = menu;
    const legend = document.createElement('legend');
    legend.textContent = MENU_LABELS[menu] || menu;
    fieldset.appendChild(legend);

    const grid = document.createElement('div');
    grid.className = 'checkbox-grid';
    // A product belongs to exactly one Collection category (Robes/Tops/...),
    // one accessory type (Sacs/Bijoux/...) if it's an accessory, one
    // Collaboration if it's a collaboration, one Saison, and one Nouveautés
    // tag (Drop été/Édition limitée/Pièces signature) - all mutually
    // exclusive radio groups within their menu (Catégories/Accessoires/
    // Collaborations are additionally exclusive with each other, enforced
    // below).
    const radioNameByMenu = { categories: 'filter-category', accessoires: 'filter-accessory-type', collaborations: 'filter-collaboration', collections: 'filter-season', nouveautes: 'filter-nouveaute-tag', nouveautes_categories: 'filter-nouveaute-category' };
    const radioName = radioNameByMenu[menu];
    // "Tout voir" is no longer pickable in Catégories/Collaborations - every
    // product now needs a real classification, so this catch-all doesn't
    // belong among those choices (its filter rows stay untouched). In
    // Nouveautés, "Tout voir" is kept but stays a standalone checkbox, not
    // part of the Drop été/Édition limitée/Pièces signature radio group.
    const menuOptions = (menu === 'categories' || menu === 'collaborations')
      ? filtersByMenu[menu].filter((filter) => (filter.label || filter.name) !== 'Tout voir')
      : filtersByMenu[menu];
    menuOptions.forEach((filter) => {
      const label = document.createElement('label');
      const filterLabel = filter.label || filter.name;
      // "Créations exclusives" isn't a brand collab, and Nouveautés' "Tout
      // voir" isn't a specific tag - both can be checked alongside their
      // group's radio option instead of being mutually exclusive with it.
      const isStandaloneCollab = menu === 'collaborations' && filterLabel === 'Créations exclusives';
      const isStandaloneNouveaute = menu === 'nouveautes' && filterLabel.trim() === 'Tout voir';
      const inputAttrs = radioName && !isStandaloneCollab && !isStandaloneNouveaute ? `type="radio" name="${radioName}"` : 'type="checkbox"';
      const toutVoirAttr = isStandaloneNouveaute ? ' data-nouveaute-tout-voir="true"' : '';
      label.innerHTML = `<input ${inputAttrs} value="${filter.id}" data-menu="${menu}"${toutVoirAttr}> ${filterLabel}`;
      grid.appendChild(label);
    });
    fieldset.appendChild(grid);

    // This "Accessoires" option looks identical to the real one in
    // Catégories (visible sur Collection) but is a separate, independent
    // tag just for the Nouveautés page - clicking it alone doesn't make
    // Matière appear and doesn't satisfy the "choisissez une catégorie"
    // requirement, which confused testers, so it gets its own reminder.
    if (menu === 'nouveautes_categories') {
      const note = document.createElement('p');
      note.className = 'field-hint field-hint-neutral';
      note.textContent = 'Ceci ne remplace pas la vraie catégorie (Catégories visible sur Collection, ci-dessus) - cochez toujours celle-là en premier.';
      fieldset.appendChild(note);
    }

    container.appendChild(fieldset);

    // Sacs/Bijoux/Ceintures/Foulards only make sense once "Accessoires" is
    // picked as the Collection category, so this whole fieldset stays
    // hidden until then instead of always being visible.
    if (menu === 'accessoires') {
      fieldset.id = 'accessoires-type-fieldset';
      fieldset.hidden = true;
      // Matière only makes sense right after picking an accessory type, so
      // it's moved to sit directly under this fieldset instead of at the
      // bottom of the whole classification block.
      fieldset.insertAdjacentElement('afterend', document.getElementById('material-field'));
    }
  });
}

function resetForm() {
  editingId = null;
  document.getElementById('product-id').value = '';
  document.getElementById('form-title').textContent = 'Nouveau produit';
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-description').value = '';
  document.getElementById('f-style-notes').value = '';
  document.getElementById('f-care-instructions').value = '';
  document.getElementById('f-show-in-related').checked = false;
  document.getElementById('images-list').innerHTML = '';
  document.getElementById('images-list').appendChild(imageRow());
  document.getElementById('variants-list').innerHTML = '';
  document.getElementById('review-photos-list').innerHTML = '';
  document.getElementById('reviews-list').innerHTML = '';
  document.getElementById('f-fit-rating').value = 'normal';
  document.getElementById('f-quality-rating').value = 'premium';
  document.querySelectorAll('#material-checkboxes input[type="checkbox"]').forEach((cb) => { cb.checked = false; });
  document.querySelectorAll('#filters-container input:not([name="material"])').forEach((cb) => { cb.checked = false; });
  updateAccessoryTypeFieldsetVisibility();
  updateCollaborationHiddenFieldsets();
  updateMaterialCheckboxAvailability();
  document.getElementById('form-status').textContent = '';
  document.getElementById('form-status').className = 'status-msg';
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

function fillFormWithProduct(product) {
  editingId = product.id;
  document.getElementById('product-id').value = product.id;
  document.getElementById('form-title').textContent = 'Modifier: ' + (product.name || '');
  document.getElementById('f-name').value = product.name || '';
  document.getElementById('f-price').value = product.price || '';
  document.getElementById('f-description').value = product.description || '';
  document.getElementById('f-style-notes').value = product.style_notes || '';
  document.getElementById('f-care-instructions').value = product.care_instructions || '';
  document.getElementById('f-show-in-related').checked = !!product.show_in_related;
  document.getElementById('f-fit-rating').value = product.fit_rating || 'normal';
  document.getElementById('f-quality-rating').value = product.quality_rating || 'premium';

  const productMaterials = new Set((Array.isArray(product.material) ? product.material : []).map(String));
  document.querySelectorAll('#material-checkboxes input[type="checkbox"]').forEach((cb) => {
    cb.checked = productMaterials.has(cb.value);
  });

  const reviewPhotosList = document.getElementById('review-photos-list');
  reviewPhotosList.innerHTML = '';
  (Array.isArray(product.review_photos) ? product.review_photos : []).forEach((url) => reviewPhotosList.appendChild(reviewPhotoRow(url)));

  const reviewsList = document.getElementById('reviews-list');
  reviewsList.innerHTML = '';
  (Array.isArray(product.reviews) ? product.reviews : []).forEach((review) => {
    reviewsList.appendChild(reviewRow(review.author || '', review.rating || 5, review.text || ''));
  });

  const imagesList = document.getElementById('images-list');
  imagesList.innerHTML = '';
  const urls = Array.isArray(product.all_images) && product.all_images.length ? product.all_images : [''];
  urls.forEach((url) => imagesList.appendChild(imageRow(url)));

  const variantsList = document.getElementById('variants-list');
  variantsList.innerHTML = '';
  (product.variants || []).forEach((variant) => {
    variantsList.appendChild(variantRow(variant.size || '', variant.color || '', variant.stock ?? ''));
  });

  const filterIds = new Set((product.filter_ids || []).map(String));
  document.querySelectorAll('#filters-container input:not([name="material"])').forEach((cb) => {
    cb.checked = filterIds.has(String(cb.value));
  });
  // Reveal the Accessoires-type fieldset first (based on the just-restored
  // checked state) before clearing/evaluating anything that depends on it,
  // so a saved accessory product's Sacs/Bijoux/... selection isn't wiped.
  const accessoryTypeFieldset = document.getElementById('accessoires-type-fieldset');
  if (accessoryTypeFieldset) accessoryTypeFieldset.hidden = !isAccessoryCategorySelected();
  ['categories', 'collections', 'nouveautes', 'nouveautes_categories'].forEach((menu) => {
    const fieldset = document.querySelector(`#filters-container fieldset[data-menu="${menu}"]`);
    if (fieldset) fieldset.hidden = isCollaborationSelected();
  });
  updateVariantSizeAvailability();
  updateMaterialCheckboxAvailability();

  document.getElementById('form-status').textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadProductList() {
  const res = await apiFetch('/api/products');
  const products = await res.json();
  const listEl = document.getElementById('product-list');
  listEl.innerHTML = '';

  if (!products.length) {
    listEl.innerHTML = '<p style="font-size:0.82rem;color:#6f675f;">Aucun produit pour le moment.</p>';
    return;
  }

  products.forEach((product) => {
    const item = document.createElement('div');
    item.className = 'product-list-item';
    const img = product.image_url ? `<img src="${product.image_url}" alt="">` : '<div style="width:34px;height:42px;background:#eee;"></div>';
    item.innerHTML = `
      ${img}
      <div class="meta"><strong>${product.name || 'Sans nom'}</strong><span>${product.price || 0}€</span></div>
      <button type="button" class="del" title="Supprimer">🗑</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.del')) return;
      fillFormWithProduct(product);
    });
    item.querySelector('.del').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Supprimer "${product.name}" ?`)) return;
      try {
        await adminPost({ action: 'delete', id: product.id });
        if (editingId === product.id) resetForm();
        loadProductList();
      } catch (error) {
        alert('Erreur: ' + error.message);
      }
    });
    listEl.appendChild(item);
  });
}

document.getElementById('product-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = e.target.querySelector('button[type="submit"]');
  if (submitBtn.disabled) return;
  submitBtn.disabled = true;

  const statusEl = document.getElementById('form-status');
  statusEl.className = 'status-msg';
  statusEl.textContent = 'Enregistrement...';

  const images = [...new Set(
    Array.from(document.querySelectorAll('#images-list input'))
      .map((input) => input.value.trim())
      .filter(Boolean)
  )];

  const variants = Array.from(document.querySelectorAll('#variants-list .list-row')).map((row) => {
    const size = row.querySelector('.variant-size').value.trim();
    const color = row.querySelector('.variant-color').value.trim();
    const stock = Number(row.querySelector('input[type="number"]').value) || 0;
    return { size, color, stock };
  }).filter((v) => v.size || v.color);

  const reviewPhotos = [...new Set(
    Array.from(document.querySelectorAll('#review-photos-list input'))
      .map((input) => input.value.trim())
      .filter(Boolean)
  )];

  const reviews = Array.from(document.querySelectorAll('#reviews-list .review-row')).map((row) => ({
    author: row.querySelector('.review-author').value.trim(),
    rating: Number(row.querySelector('.review-rating').value) || 5,
    text: row.querySelector('.review-text').value.trim()
  })).filter((r) => r.text);

  const filterIds = Array.from(document.querySelectorAll('#filters-container input:not([name="material"]):checked'))
    .map((cb) => Number(cb.value));

  const checkedFilters = filterIds
    .map((id) => Object.values(filtersByMenu).flat().find((f) => f.id === id))
    .filter(Boolean);
  const category = checkedFilters.find((f) => f.menu === 'categories')?.label || '';
  const pageType = checkedFilters.find((f) => f.menu !== 'categories')?.menu || (category ? 'collection' : '');
  const nouveauteTag = checkedFilters.find((f) => f.menu === 'nouveautes')?.slug || '';

  // Every product needs exactly one classification: a Collection category
  // (Robes/Tops/.../Accessoires), an Accessoires type (Sacs/Bijoux/...), or
  // a Collaboration (Tout voir/JACES x .../...) - all mutually exclusive
  // radio groups, enforced live by enforceCollaborationExclusivity.
  const hasCategory = checkedFilters.some((f) => f.menu === 'categories');
  const hasAccessoryType = checkedFilters.some((f) => f.menu === 'accessoires');
  const hasCollaboration = checkedFilters.some((f) => f.menu === 'collaborations');
  if (!hasCategory && !hasAccessoryType && !hasCollaboration) {
    statusEl.textContent = 'Erreur: choisissez une catégorie (Robes/Tops/...), un type d\'accessoire (Sacs/Bijoux/...) ou une collaboration.';
    statusEl.className = 'status-msg error';
    submitBtn.disabled = false;
    return;
  }

  // Nom, Prix (native "required"), Description ("required" on the
  // textarea) and Variantes are the mandatory fields - Porté et
  // style/Entretien stay optional (collapsed by default in the UI).
  const hasValidVariant = variants.some((v) => (v.size || v.color) && v.stock > 0);
  if (!hasValidVariant) {
    statusEl.textContent = 'Erreur: ajoutez au moins une variante (taille/couleur et stock).';
    statusEl.className = 'status-msg error';
    submitBtn.disabled = false;
    return;
  }

  // Choosing the "Accessoires" Collection category specifically also
  // requires picking which type it is (Sacs/Bijoux/Ceintures/Foulards).
  if (category === 'Accessoires' && !hasAccessoryType) {
    statusEl.textContent = 'Erreur: choisissez un type d\'accessoire (Sacs/Bijoux/Ceintures/Foulards).';
    statusEl.className = 'status-msg error';
    submitBtn.disabled = false;
    return;
  }

  // Accessoires (Sacs/Bijoux/Ceintures/Foulards) need Matière and at least
  // one couleur+stock entry - "taille" doesn't apply the way it does to
  // clothing, so it's the one variant field that stays optional for them.
  const isAccessory = checkedFilters.some((f) => f.menu === 'accessoires');
  if (isAccessory) {
    const materialChecked = document.querySelectorAll('#material-checkboxes input[type="checkbox"]:checked').length > 0;
    if (!materialChecked) {
      statusEl.textContent = 'Erreur: choisissez au moins une Matière pour un accessoire.';
      statusEl.className = 'status-msg error';
      submitBtn.disabled = false;
      return;
    }
    const hasColorStockVariant = variants.some((v) => v.color && v.stock > 0);
    if (!hasColorStockVariant) {
      statusEl.textContent = 'Erreur: ajoutez au moins une variante avec couleur et stock pour un accessoire.';
      statusEl.className = 'status-msg error';
      submitBtn.disabled = false;
      return;
    }
  }

  const payload = {
    action: editingId ? 'update' : 'create',
    id: editingId || undefined,
    name: document.getElementById('f-name').value.trim(),
    price: Number(document.getElementById('f-price').value) || 0,
    description: document.getElementById('f-description').value.trim(),
    styleNotes: document.getElementById('f-style-notes').value.trim(),
    careInstructions: document.getElementById('f-care-instructions').value.trim(),
    showInRelated: document.getElementById('f-show-in-related').checked,
    fitRating: document.getElementById('f-fit-rating').value,
    qualityRating: document.getElementById('f-quality-rating').value,
    material: Array.from(document.querySelectorAll('#material-checkboxes input[type="checkbox"]:checked')).map((cb) => cb.value),
    reviewPhotos,
    reviews,
    images,
    variants,
    filterIds,
    category,
    pageType,
    nouveauteTag
  };

  try {
    await adminPost(payload);
    resetForm();
    statusEl.textContent = 'Enregistré ✓';
    statusEl.className = 'status-msg ok';
    loadProductList();
  } catch (error) {
    if (error.message === 'unauthorized') return;
    statusEl.textContent = 'Erreur: ' + error.message;
    statusEl.className = 'status-msg error';
  } finally {
    submitBtn.disabled = false;
  }
});

function isAccessorySelected() {
  // Either an "Accessoires" category checkbox (Collection or Nouveautés)
  // or a specific accessory type (Sacs/Bijoux/Ceintures/Foulards) counts -
  // any of these mean the product isn't clothing and shouldn't use a
  // clothing size.
  return isAccessoryCategorySelected() || isAccessoryTypeSelected();
}

// Narrower than isAccessorySelected() - only true once a specific accessory
// type (Sacs/Bijoux/Ceintures/Foulards) is checked, not just the generic
// "Accessoires" Collection category. Matière only opens at that point,
// since picking "Accessoires" alone still requires choosing one of those
// four types before the product can be saved anyway.
function isAccessoryTypeSelected() {
  const accessoryIds = new Set((filtersByMenu.accessoires || []).map((f) => String(f.id)));
  return Array.from(document.querySelectorAll('#filters-container input:not([name="material"]):checked'))
    .some((cb) => accessoryIds.has(cb.value));
}

// Only true for the generic "Accessoires" Collection category checkbox
// specifically (not the Sacs/Bijoux/... sub-types themselves).
function isAccessoryCategorySelected() {
  // Both the real "Accessoires" (Catégories visible sur Collection) and its
  // Nouveautés-only look-alike (Catégories visible sur Nouveautés) reveal
  // Sacs/Bijoux/Ceintures/Foulards - whichever one the admin clicks first,
  // the intent ("this is an accessory") is the same either way.
  const accessoryCategoryIds = new Set(
    ['categories', 'nouveautes_categories']
      .flatMap((menu) => filtersByMenu[menu] || [])
      .filter((f) => (f.label || f.name) === 'Accessoires')
      .map((f) => String(f.id))
  );
  return Array.from(document.querySelectorAll('#filters-container input:not([name="material"]):checked'))
    .some((cb) => accessoryCategoryIds.has(cb.value));
}

// Sacs/Bijoux/Ceintures/Foulards only make sense once "Accessoires" is
// picked as the Collection category - the whole fieldset stays hidden
// (and any previously checked sub-type cleared) until then.
function updateAccessoryTypeFieldsetVisibility() {
  const enable = isAccessoryCategorySelected();
  const fieldset = document.getElementById('accessoires-type-fieldset');
  if (!fieldset) return;
  fieldset.hidden = !enable;
  if (!enable) {
    // Sacs/Bijoux/Ceintures/Foulards render as radio inputs (single-choice
    // within the menu), not checkboxes - clear whichever type is present.
    fieldset.querySelectorAll('input').forEach((cb) => { cb.checked = false; });
  }
}

// Accessoires don't use a clothing size, so the Taille select in each
// variant row is locked (and cleared) once an accessory type is checked.
function updateVariantSizeAvailability() {
  const disable = isAccessorySelected();
  document.querySelectorAll('#variants-list .variant-size').forEach((select) => {
    select.disabled = disable;
    if (disable) select.value = '';
  });
}

// Matière only makes sense for an accessory - the whole field stays
// hidden (not just disabled) until Accessoires/Sacs/Bijoux/Ceintures/
// Foulards is checked, so it's never "asked" before that.
function updateMaterialCheckboxAvailability() {
  const enable = isAccessoryTypeSelected();
  document.getElementById('material-field').hidden = !enable;
  document.querySelectorAll('#material-checkboxes input[type="checkbox"]').forEach((cb) => {
    cb.disabled = !enable;
    if (!enable) cb.checked = false;
  });
}

// A product is either a "regular" catalog item (Collection category and/or
// Accessoires type) or a Collaboration - not both, so picking one side
// clears whatever was checked on the other. Uses data-menu rather than the
// radio name so "Créations exclusives" (a plain checkbox, since it can be
// combined with one brand collab) still counts as "this is a collaboration".
function enforceCollaborationExclusivity(event) {
  const input = event.target;
  if (!input || !input.checked || !input.dataset.menu) return;

  if (input.dataset.menu === 'collaborations') {
    document.querySelectorAll('#filters-container input[data-menu="categories"]:checked, #filters-container input[data-menu="accessoires"]:checked').forEach((other) => {
      other.checked = false;
    });
  } else if (input.dataset.menu === 'categories' || input.dataset.menu === 'accessoires') {
    document.querySelectorAll('#filters-container input[data-menu="collaborations"]:checked').forEach((other) => {
      other.checked = false;
    });
  }
}

// Picking a specific Nouveautés badge (Drop été/Édition limitée/Pièces
// signature) also checks "Tout voir" automatically, since a product with
// any of the three already shows up under "Toutes les nouveautés" on the
// site - this just makes that visible in the admin form too.
function autoCheckNouveauteToutVoir(event) {
  const input = event.target;
  if (input.name !== 'filter-nouveaute-tag' || !input.checked) return;
  const toutVoir = document.querySelector('#filters-container input[data-nouveaute-tout-voir="true"]');
  if (toutVoir) toutVoir.checked = true;
}

function isCollaborationSelected() {
  return document.querySelectorAll('#filters-container input[data-menu="collaborations"]:checked').length > 0;
}

// A Collaboration product doesn't use the regular Catégories/Saison
// classification or the Nouveautés one - once a Collaboration is checked,
// all four of those fieldsets hide (and clear) since a product is either
// a "regular" catalog item or a Collaboration, never both.
function updateCollaborationHiddenFieldsets() {
  const hide = isCollaborationSelected();
  ['categories', 'collections', 'nouveautes', 'nouveautes_categories'].forEach((menu) => {
    const fieldset = document.querySelector(`#filters-container fieldset[data-menu="${menu}"]`);
    if (!fieldset) return;
    fieldset.hidden = hide;
    if (hide) {
      fieldset.querySelectorAll('input').forEach((cb) => { cb.checked = false; });
    }
  });
}

document.getElementById('filters-container').addEventListener('change', (event) => {
  enforceCollaborationExclusivity(event);
  updateCollaborationHiddenFieldsets();
  autoCheckNouveauteToutVoir(event);
  updateAccessoryTypeFieldsetVisibility();
  updateVariantSizeAvailability();
  updateMaterialCheckboxAvailability();
});

async function init() {
  await loadFilters();
  resetForm();
  await loadProductList();
}

if (getPassword()) {
  adminPost({ action: 'ping' }).then(showApp).catch((error) => {
    if (error.message !== 'unauthorized') showApp();
  });
} else {
  showGate('');
}
</script>
